{% extends 'base.html' %}

{% block title %}Enable User{% endblock %}

{% block content %}
<div class="min-h-screen w-full max-w-full min-w-0 flex flex-col items-center pt-12 sm:pt-20 px-3">
  <div class="bg-white text-slate-700 shadow-md rounded w-full max-w-lg p-6 text-center">
    <h2 class="text-xl font-semibold mb-4">Are you sure you want to enable user "{{ object.username }}"?</h2>
    <p class="mb-6 text-gray-600">The user will regain access to the system.</p>
    
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Enable</button>
      <a href="{% url 'wrsm_app:station-users' %}" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 ml-3">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
