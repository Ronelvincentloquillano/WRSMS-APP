{% extends "base.html" %}

{% block title %}Password reset{% endblock %}

{% block content %}
<div class="flex min-h-[80vh] flex-col justify-center py-12 px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md mb-10">
    <h2 class="text-center text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">
      Password set
    </h2>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white dark:bg-slate-700 py-10 px-6 shadow-xl rounded sm:px-12 border border-slate-300">
      <div class="text-center space-y-6">
        <p class="text-slate-700 dark:text-slate-200">
          Your password has been set successfully.
        </p>
        <div>
          <a href="{% url 'account:login' %}" class="inline-flex w-full justify-center rounded-md bg-blue-600 py-3 px-4 text-sm font-bold text-white shadow-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors">
            Log in now
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
