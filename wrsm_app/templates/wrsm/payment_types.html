{% extends 'base.html' %}
{% load static %}

{% block title %}Payment Types{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col space-y-4">

  <div class="text-center mt-5">
    <h2 class="text-4xl">Payment Types</h2>
  </div>

  <section class="bg-slate-100 rounded p-2 text-slate-800 dark:bg-slate-500 dark:text-slate-100 min-w-[300px]">
    <table class="table-auto overflow-x-auto w-full">
      <thead class="dark:bg-slate-700 bg-slate-300 dark:text-slate-100/50">
        <tr class="text-left">
          <th class="px-4 py-2">Name</th>
          <th class="px-4 py-2">Sort #</th>
        </tr>
      </thead>
      <tbody>
        {% for type in paymenttypes %}
        <tr>
          <td class="border px-4 py-2">{{ type.name }}</td>
          <td class="border px-4 py-2">{{ type.sort_number }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </section>
  <div class="flex justify-between space-x-2">
    <a href="{% url 'wrsm_app:add-payment-type' %}" 
      class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 shadow-xl">
      Add payment type
    </a>
    <a href="{% url 'wrsm_app:station-setting-detail' %}" 
      class="bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 shadow-xl">
      Station Settings
    </a>
  </div>
</div>
{% endblock %}
