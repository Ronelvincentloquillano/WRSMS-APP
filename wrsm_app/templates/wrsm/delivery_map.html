{% extends 'base.html' %}
{% load static %}

{% block title %}Delivery Map (Today){% endblock %}

{% block links %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
    #map { height: calc(100vh - 150px); width: 100%; border-radius: 0.5rem; }
    .legend {
        background: white;
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
        font-size: 13px;
        line-height: 1.3;
    }
    .legend-row { margin-bottom: 6px; }
    .legend-row:last-child { margin-bottom: 0; }
    .legend-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 9999px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        margin-left: 6px;
        vertical-align: middle;
    }
    .legend-badge-pending { background: #e2e8f0; color: #334155; }
    .legend-badge-progress { background: #dbeafe; color: #1e3a8a; }
    .legend-badge-completed { background: #bbf7d0; color: #14532d; }
    .legend-badge-cancelled { background: #fecaca; color: #7f1d1d; }
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen p-4 flex flex-col">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-3xl font-bold dark:text-white">Delivery Map (Today)</h1>
        <div class="space-x-2">
            <a href="{% url 'wrsm_app:add-order' %}" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 shadow-md">
                Add Order
            </a>
            <a href="{% url 'wrsm_app:orders' %}" class="bg-gray-600 text-white px-4 py-2 rounded-md hover:bg-gray-700 shadow-md">
                Back to Orders
            </a>
        </div>
    </div>
    
    <div class="bg-white dark:bg-slate-800 p-2 rounded-lg shadow-md flex-grow">
        <div id="map"></div>
    </div>
</div>

<script>
    // Default to Puerto Princesa if no orders
    var map = L.map('map').setView([9.7392, 118.7357], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var orders = {{ orders_json|safe }};
    var markers = [];

    // Custom icons based on status
    var greenIcon = new L.Icon({
        iconUrl: '{% static "img/markers/marker-green.svg" %}',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
    });

    var blueIcon = new L.Icon({
        iconUrl: '{% static "img/markers/marker-blue.svg" %}',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
    });
    
    var greyIcon = new L.Icon({
        iconUrl: '{% static "img/markers/marker-grey.svg" %}',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
    });

    var redIcon = new L.Icon({
        iconUrl: '{% static "img/markers/marker-red.svg" %}',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
    });


    orders.forEach(function(o) {
        var icon = blueIcon; // Default Pending
        if (o.status === 'In Progress') icon = blueIcon;
        else if (o.status === 'Completed') icon = greenIcon;
        else if (o.status === 'Cancelled') icon = redIcon;
        else if (o.status === 'Pending') icon = greyIcon;

        var marker = L.marker([o.lat, o.lng], {icon: icon})
            .bindPopup(`
                <div class="font-sans">
                    <h3 class="font-bold text-lg">${o.customer}</h3>
                    <p class="text-sm"><b>Status:</b> ${o.status}</p>
                    <p class="text-sm"><b>Order Type:</b> ${o.order_type}</p>
                    <p class="text-sm"><b>Qty:</b> ${o.quantity || '-'}</p>
                    <p class="text-sm"><b>Note:</b> ${o.note || ''}</p>
                    <div class="mt-2">
                        <a href="${o.url}" class="text-blue-600 hover:underline text-sm">Update Order</a>
                    </div>
                </div>
            `);
        marker.addTo(map);
        markers.push(marker);
    });

    if (markers.length > 0) {
        var group = new L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
    }
    
    // Add Legend
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'legend');
        div.innerHTML += '<div class="legend-row"><img src="{% static "img/markers/marker-grey.svg" %}" class="inline w-3 h-4 mr-1" alt="Pending marker"><span class="legend-badge legend-badge-pending">Pending</span></div>';
        div.innerHTML += '<div class="legend-row"><img src="{% static "img/markers/marker-blue.svg" %}" class="inline w-3 h-4 mr-1" alt="In Progress marker"><span class="legend-badge legend-badge-progress">In Progress</span></div>';
        div.innerHTML += '<div class="legend-row"><img src="{% static "img/markers/marker-green.svg" %}" class="inline w-3 h-4 mr-1" alt="Completed marker"><span class="legend-badge legend-badge-completed">Completed</span></div>';
        div.innerHTML += '<div class="legend-row"><img src="{% static "img/markers/marker-red.svg" %}" class="inline w-3 h-4 mr-1" alt="Cancelled marker"><span class="legend-badge legend-badge-cancelled">Cancelled</span></div>';
        return div;
    };
    legend.addTo(map);

</script>
{% endblock %}
