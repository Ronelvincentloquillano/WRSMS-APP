{% extends 'base.html' %}
{% load static %}

{% block title %}Jug Types{% endblock %}

{% block content %}
<div class="min-h-screen w-full max-w-full min-w-0 flex flex-col space-y-4 px-3 sm:px-4 py-4">

  <div class="text-center mt-2 sm:mt-5">
    <h2 class="text-2xl sm:text-4xl">Jug Types</h2>
  </div>

  <section class="w-full max-w-full min-w-0 bg-slate-100 dark:bg-slate-500 rounded-lg p-2 text-slate-800 dark:text-slate-100">
    <div class="w-full overflow-x-auto">
    <table class="w-full min-w-[200px] text-sm">
      <thead class="dark:bg-slate-700 bg-slate-300 dark:text-slate-100/50">
        <tr class="text-left">
          <th class="px-4 py-2">Jug Type</th>
        </tr>
      </thead>
      <tbody>
        {% for type in jug_types %}
        <tr>
          <td class="border px-4 py-2">{{ type.jug_type }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    </div>
  </section>
  <div class="flex flex-wrap justify-between gap-3">
    <a href="{% url 'wrsm_app:add-jug-type' %}" 
      class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 shadow-xl">
      Add jug type
    </a>
    <a href="{% url 'wrsm_app:station-setting-detail' %}"
      class="bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 shadow-xl">
      Station Settings
    </a>
  </div>
</div>
{% endblock %}
