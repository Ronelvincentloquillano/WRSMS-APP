{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Add Promo{% endblock %}

{% block content %}
<div class="w-full max-w-3xl mx-auto min-w-0 flex flex-col items-stretch mb-10 px-3 sm:px-4">
  <div class="bg-white text-slate-700 shadow-md rounded-lg w-full md:w-full mt-10">
    <div class="text-center border-b p-4">
      <h2 class="text-2xl font-semibold">Add Promo</h2>
    </div>
    <div class="p-5">
      <div class="mb-4 rounded-md border border-blue-200 bg-blue-50 px-4 py-3 text-sm text-blue-900">
        Example data:
        <span class="font-semibold">SUMMER10</span> | 10% off on selected refills | 2026-12-31
      </div>
      <form action="" method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" 
          class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 shadow-xl">
          Submit
        </button>
        <a href="{% url 'wrsm_app:promos' %}" 
          class="bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 shadow-xl">
          Cancel
        </a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
