{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Add Station Settings{% endblock %}

{% block content %}
<div class="w-full max-w-3xl mx-auto min-w-0 flex flex-col items-stretch mb-10 px-3 sm:px-4">
  <div class="bg-white text-slate-700 shadow-md rounded-lg w-full md:w-full mt-10">
    <div class="text-center border-b p-4">
      <h2 class="text-2xl font-semibold">Add Station Settings</h2>
    </div>
    <div class="p-5">
      <form method="post" autocomplete="off" id="add_sales_form" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 shadow-xl" 
          type="submit">
          Submit
        </button>
        <a href="{% url 'wrsm_app:dashboard' %}" 
          class="bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 shadow-xl">
          Cancel
        </a>
      </form>
    </div>    
  </div>
</div>
{% endblock %}
