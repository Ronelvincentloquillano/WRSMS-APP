{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Add Net Terms{% endblock %}

{% block content %}
<div class="min-h-screen w-full max-w-3xl mx-auto min-w-0 flex flex-col items-stretch px-3 sm:px-4">
  <div class="bg-white text-slate-700 shadow-md rounded-lg w-full mt-6 sm:mt-10">
    <div class="text-center border-b p-4">
      <h2 class="text-2xl font-semibold">Add Net Terms</h2>
    </div>
    <div class="p-5">
      <div class="mb-4 rounded-md border border-blue-200 bg-blue-50 px-4 py-3 text-sm text-blue-900">
        Example data:
        <span class="font-semibold">Net 15</span> | 15 | Payment due within 15 days from invoice date
      </div>
      <form method="post" autocomplete="off">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 shadow-xl" type="submit">Submit</button>
        <a href="{% url 'wrsm_app:net-terms' %}" class="bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 shadow-xl">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
