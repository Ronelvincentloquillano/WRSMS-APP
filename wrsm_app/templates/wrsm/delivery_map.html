{% extends 'base.html' %}
{% load static %}

{% block title %}Delivery Map (Today){% endblock %}

{% block links %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
    #map { height: calc(100vh - 150px); width: 100%; border-radius: 0.5rem; }
    .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
    .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen p-4 flex flex-col">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-3xl font-bold dark:text-white">Delivery Map (Today)</h1>
        <div class="space-x-2">
            <a href="{% url 'wrsm_app:add-order' %}" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 shadow-md">
                Add Order
            </a>
            <a href="{% url 'wrsm_app:orders' %}" class="bg-gray-600 text-white px-4 py-2 rounded-md hover:bg-gray-700 shadow-md">
                Back to Orders
            </a>
        </div>
    </div>
    
    <div class="bg-white dark:bg-slate-800 p-2 rounded-lg shadow-md flex-grow">
        <div id="map"></div>
    </div>
</div>

<script>
    // Default to Puerto Princesa if no orders
    var map = L.map('map').setView([9.7392, 118.7357], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var orders = {{ orders_json|safe }};
    var markers = [];

    // Custom icons based on status
    var greenIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    var blueIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });
    
    var greyIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-grey.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    var redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });


    orders.forEach(function(o) {
        var icon = blueIcon; // Default Pending
        if (o.status === 'In Progress') icon = blueIcon;
        else if (o.status === 'Completed') icon = greenIcon;
        else if (o.status === 'Cancelled') icon = redIcon;
        else if (o.status === 'Pending') icon = greyIcon;

        var marker = L.marker([o.lat, o.lng], {icon: icon})
            .bindPopup(`
                <div class="font-sans">
                    <h3 class="font-bold text-lg">${o.customer}</h3>
                    <p class="text-sm"><b>Status:</b> ${o.status}</p>
                    <p class="text-sm"><b>Order Type:</b> ${o.order_type}</p>
                    <p class="text-sm"><b>Qty:</b> ${o.quantity || '-'}</p>
                    <p class="text-sm"><b>Note:</b> ${o.note || ''}</p>
                    <div class="mt-2">
                        <a href="${o.url}" class="text-blue-600 hover:underline text-sm">Update Order</a>
                    </div>
                </div>
            `);
        marker.addTo(map);
        markers.push(marker);
    });

    if (markers.length > 0) {
        var group = new L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
    }
    
    // Add Legend
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'legend');
        div.innerHTML += '<div class="mb-1"><img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-grey.png" class="inline w-3 h-4 mr-1"> Pending</div>';
        div.innerHTML += '<div class="mb-1"><img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png" class="inline w-3 h-4 mr-1"> In Progress</div>';
        div.innerHTML += '<div class="mb-1"><img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png" class="inline w-3 h-4 mr-1"> Completed</div>';
        div.innerHTML += '<div><img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png" class="inline w-3 h-4 mr-1"> Cancelled</div>';
        return div;
    };
    legend.addTo(map);

</script>
{% endblock %}
