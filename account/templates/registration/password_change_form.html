{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Change your password{% endblock %}

{% block content %}
<div class="flex min-h-[80vh] flex-col justify-center py-12 px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md mb-10">
    <h2 class="text-center text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">
      Change your password
    </h2>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white dark:bg-slate-700 py-10 px-6 shadow-xl rounded sm:px-12 border border-slate-300">
      <form action="" method="post" class="space-y-6">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="flex flex-col gap-3">
          <button type="submit" class="flex w-full justify-center rounded-md bg-blue-600 py-3 px-4 text-sm font-bold text-white shadow-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors">
            Change Password
          </button>
          <a href="{% url 'wrsm_app:dashboard' %}" class="flex w-full justify-center rounded-md bg-gray-500 py-3 px-4 text-sm font-bold text-white shadow-md hover:bg-gray-600 transition-colors">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
