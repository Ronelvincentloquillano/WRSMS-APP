{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Add Forecast{% endblock %}

{% block content %}
<div class="container-fluid w-full max-w-full min-w-0 px-3 sm:px-4">
  <div class="card col-12 col-sm-10 col-md-6 col-lg-5 mx-auto mt-5 mb-5 bg-light border rounded shadow-lg w-full max-w-lg">
    <div class="card-header text-center">
      <h2>Add Forecast</h2>
    </div>
    <div class="card-body">
      <form action="" method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="text-center mb-3">
          <button class="btn btn-primary" type="submit">Submit</button>
          <a href="{% url 'wrsm_app:forecast-list' pk=station.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
