{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Add Station Settings{% endblock %}

{% block content %}
<div class="container min-vh-100 d-flex justify-content-center align-items-center">
  <div class="card col-md-6 shadow">
    <div class="card-header text-center">
      <h2>Add Station Settings</h2>
    </div>
    <div class="card-body">
      <form method="post" autocomplete="off" id="add_sales_form" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-primary" type="submit">Submit</button>
        <a href="{% url 'wrsm_app:dashboard' %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
