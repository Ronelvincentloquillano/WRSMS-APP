{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Manage Articles</h1>
        <a href="{% url 'wrsm_app:add-article' %}" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow">
            + Add New Article
        </a>
    </div>
    
    <div class="bg-white dark:bg-slate-700 rounded-lg shadow-md overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 dark:bg-slate-800 text-left text-xs font-semibold text-gray-600 dark:text-gray-300 uppercase tracking-wider">
                            Title
                        </th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 dark:bg-slate-800 text-left text-xs font-semibold text-gray-600 dark:text-gray-300 uppercase tracking-wider">
                            Date Published
                        </th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 dark:bg-slate-800 text-left text-xs font-semibold text-gray-600 dark:text-gray-300 uppercase tracking-wider">
                            Actions
                        </th>
                    </tr>
                </thead>
                <tbody>
                    {% for article in articles %}
                    <tr class="hover:bg-gray-50 dark:hover:bg-slate-600">
                        <td class="px-5 py-5 border-b border-gray-200 dark:border-slate-600 text-sm">
                            <p class="text-gray-900 dark:text-gray-200 whitespace-no-wrap font-medium">
                                {{ article.title }}
                            </p>
                        </td>
                        <td class="px-5 py-5 border-b border-gray-200 dark:border-slate-600 text-sm">
                            <p class="text-gray-900 dark:text-gray-200 whitespace-no-wrap">
                                {{ article.date_published|date:"M d, Y" }}
                            </p>
                        </td>
                        <td class="px-5 py-5 border-b border-gray-200 dark:border-slate-600 text-sm">
                            <div class="flex gap-4">
                                <a href="{% url 'wrsm_app:update-article' article.pk %}" class="text-blue-600 hover:text-blue-900 dark:text-blue-400 dark:hover:text-blue-300">Edit</a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="px-5 py-5 border-b border-gray-200 dark:border-slate-600 text-sm text-center text-gray-500 dark:text-gray-400">
                            No articles found.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
