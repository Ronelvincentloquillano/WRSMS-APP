{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Register New Station{% endblock %}

{% block content %}
<div class="w-full max-w-3xl mx-auto min-w-0 flex flex-col items-stretch mb-10 px-3 sm:px-4">
  <div class="bg-white text-slate-700 dark:bg-slate-700 dark:text-slate-200 shadow-md rounded-lg w-full max-w-md mt-6 sm:mt-10 mx-auto">
    <div class="text-center border-b dark:border-slate-600 p-4">
      <h2 class="text-2xl font-semibold">Register New Station</h2>
    </div>
    <div class="p-5">
      <form method="post" autocomplete="off">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="mt-6 flex justify-end gap-3">
            <a href="{% url 'wrsm_app:dashboard' %}" 
            class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 shadow-sm transition-colors">
            Cancel
            </a>
            <button class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-sm transition-colors" 
            type="submit">
            Register Station
            </button>
        </div>
      </form>
    </div>    
  </div>
</div>
{% endblock %}
