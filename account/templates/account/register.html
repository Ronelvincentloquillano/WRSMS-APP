{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Create an account{% endblock %}

{% block content %}
<div class="min-w-full flex flex-col items-center mb-10 bg-gray-50 dark:bg-slate-800 min-h-screen justify-center">
  <div class="bg-white text-slate-700 dark:bg-slate-700 dark:text-slate-200 shadow-md rounded-lg w-full max-w-md mt-10">
    <div class="text-center border-b dark:border-slate-600 p-4">
      <h2 class="text-2xl font-semibold">Create your account</h2>
      <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
        Start managing your water refilling station today.
      </p>
    </div>
    <div class="p-5">
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 shadow-xl w-full mt-4" 
          type="submit">
          Sign up
        </button>
      </form>
    </div>    
  </div>
</div>
{% endblock %}
